# ClutchCam local ingest configuration for SRS 6.x.
#
# The Docker Compose service owns the SRS process lifecycle. This file only
# enables local RTMP/SRT ingest and HTTP inspection endpoints.

listen 1935;
max_connections 1000;
daemon off;
srs_log_tank console;

http_api {
    enabled on;
    listen 1985;
}

http_server {
    enabled on;
    listen 8080;
    dir ./objs/nginx/html;
}

srt_server {
    enabled on;
    listen 10080;
    maxbw 1000000000;
    connect_timeout 4000;
    peerlatency 0;
    recvlatency 0;
    latency 0;
    tsbpdmode off;
    tlpktdrop off;
    sendbuf 2000000;
    recvbuf 2000000;
    default_streamid "#!::r=live/livestream,m=publish";
}

vhost __defaultVhost__ {
    srt {
        enabled on;
        srt_to_rtmp on;
    }

    hls {
        enabled on;
    }

    http_remux {
        enabled on;
        mount [vhost]/[app]/[stream].flv;
    }
}

stats {
    network 0;
    disk sda sdb xvda xvdb;
}
