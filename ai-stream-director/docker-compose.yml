services:
  ollama:
    image: ollama/ollama:latest
    container_name: ai-stream-director-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 12

  ollama-pull:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma3:4b}
    command: ["sh", "-c", "ollama pull \"$OLLAMA_MODEL\""]
    restart: "no"

  app:
    build: .
    container_name: ai-stream-director-app
    depends_on:
      ollama:
        condition: service_healthy
      ollama-pull:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
    stdin_open: true
    tty: true

volumes:
  ollama-data:
