services:
  media-server:
    profiles: ["media-server", "local-linux"]
    image: ${SRS_IMAGE:-ossrs/srs:6}
    container_name: ai-stream-director-media-server
    command: ["./objs/srs", "-c", "conf/clutchcam.conf"]
    ports:
      - "${SRS_BIND_ADDR:-127.0.0.1}:${SRS_RTMP_PORT:-1935}:1935/tcp"
      - "${SRS_BIND_ADDR:-127.0.0.1}:${SRS_HTTP_API_PORT:-1985}:1985/tcp"
      - "${SRS_BIND_ADDR:-127.0.0.1}:${SRS_HTTP_STREAM_PORT:-8080}:8080/tcp"
      - "${SRS_BIND_ADDR:-127.0.0.1}:${SRS_SRT_PORT:-10080}:10080/udp"
    volumes:
      - ./infra/srs.conf:/usr/local/srs/conf/clutchcam.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "test -s ./objs/srs.pid && kill -0 \"$(cat ./objs/srs.pid)\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  buffer-worker:
    profiles: ["buffer-worker", "local-linux"]
    build: .
    container_name: ai-stream-director-buffer-worker
    depends_on:
      media-server:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      INGEST_API_URL: ${INGEST_API_URL:-rtmp://media-server:1935/live}
      LOOKBACK_BUFFER_DIR: ${LOOKBACK_BUFFER_DIR:-/dev/shm/clutchcam}
      LOOKBACK_WINDOW_SECONDS: ${LOOKBACK_WINDOW_SECONDS:-30}
      SWITCH_LOOKBACK_SECONDS: ${SWITCH_LOOKBACK_SECONDS:-15}
      LOOKBACK_SEGMENT_SECONDS: ${LOOKBACK_SEGMENT_SECONDS:-2}
      FFMPEG_EXECUTABLE: ${FFMPEG_EXECUTABLE:-ffmpeg}
    volumes:
      - type: bind
        source: ${LOOKBACK_BUFFER_HOST_DIR:-/dev/shm/clutchcam}
        target: /dev/shm/clutchcam
    command: ["python", "-m", "buffer_worker"]
    healthcheck:
      test: ["CMD", "python", "-m", "buffer_worker", "--healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  transcription-worker:
    profiles: ["transcription-worker"]
    build: .
    container_name: ai-stream-director-transcription-worker
    depends_on:
      media-server:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      INGEST_API_URL: ${INGEST_API_URL:-rtmp://media-server:1935/live}
      TRANSCRIPTION_API_URL: ${TRANSCRIPTION_API_URL:-http://host.docker.internal:8000}
      TRANSCRIPTION_REQUEST_MODE: ${TRANSCRIPTION_REQUEST_MODE:-json}
      TRANSCRIPTION_ENDPOINT_PATH: ${TRANSCRIPTION_ENDPOINT_PATH:-}
      TRANSCRIPTION_MODEL: ${TRANSCRIPTION_MODEL:-Systran/faster-whisper-small}
      TRANSCRIPTION_LANGUAGE: ${TRANSCRIPTION_LANGUAGE:-}
      TRANSCRIPTION_RESPONSE_FORMAT: ${TRANSCRIPTION_RESPONSE_FORMAT:-json}
      TRANSCRIPTION_REQUEST_TIMEOUT_SECONDS: ${TRANSCRIPTION_REQUEST_TIMEOUT_SECONDS:-30}
      TRANSCRIPTION_REQUEST_OVERLAP_SECONDS: ${TRANSCRIPTION_REQUEST_OVERLAP_SECONDS:-0}
      AUDIO_EXTRACT_DIR: ${AUDIO_EXTRACT_DIR:-/dev/shm/clutchcam-audio}
      AUDIO_EXTRACT_SAMPLE_RATE: ${AUDIO_EXTRACT_SAMPLE_RATE:-16000}
      AUDIO_EXTRACT_CHANNELS: ${AUDIO_EXTRACT_CHANNELS:-1}
      AUDIO_EXTRACT_CHUNK_SECONDS: ${AUDIO_EXTRACT_CHUNK_SECONDS:-5}
      AUDIO_EXTRACT_CODEC: ${AUDIO_EXTRACT_CODEC:-pcm_s16le}
      AUDIO_EXTRACT_CONTAINER: ${AUDIO_EXTRACT_CONTAINER:-wav}
      AUDIO_INPUT_URL_PLAYER_1: ${AUDIO_INPUT_URL_PLAYER_1:-rtmp://media-server:1935/live/player_1}
      AUDIO_INPUT_URL_PLAYER_2: ${AUDIO_INPUT_URL_PLAYER_2:-rtmp://media-server:1935/live/player_2}
      AUDIO_INPUT_URL_PLAYER_3: ${AUDIO_INPUT_URL_PLAYER_3:-rtmp://media-server:1935/live/player_3}
      AUDIO_INPUT_URL_PLAYER_4: ${AUDIO_INPUT_URL_PLAYER_4:-rtmp://media-server:1935/live/player_4}
      FFMPEG_EXECUTABLE: ${FFMPEG_EXECUTABLE:-ffmpeg}
    volumes:
      - type: bind
        source: ${AUDIO_EXTRACT_HOST_DIR:-/dev/shm/clutchcam-audio}
        target: /dev/shm/clutchcam-audio
    command: ["python", "-m", "transcription_worker"]
    healthcheck:
      test: ["CMD", "python", "-m", "transcription_worker", "--healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  faster-whisper:
    profiles: ["local-transcription"]
    image: ${FASTER_WHISPER_IMAGE:-fedirz/faster-whisper-server:latest-cpu}
    container_name: ai-stream-director-faster-whisper
    ports:
      - "${FASTER_WHISPER_BIND_ADDR:-127.0.0.1}:${FASTER_WHISPER_PORT:-8000}:8000/tcp"
    environment:
      UVICORN_HOST: 0.0.0.0
      UVICORN_PORT: 8000
      LOG_LEVEL: ${FASTER_WHISPER_LOG_LEVEL:-info}
      ENABLE_UI: ${FASTER_WHISPER_ENABLE_UI:-false}
      HF_HOME: /root/.cache/huggingface
      WHISPER__MODEL: ${FASTER_WHISPER_MODEL:-Systran/faster-whisper-small}
      WHISPER__INFERENCE_DEVICE: ${FASTER_WHISPER_DEVICE:-cpu}
      WHISPER__DEVICE_INDEX: ${FASTER_WHISPER_DEVICE_INDEX:-0}
      WHISPER__COMPUTE_TYPE: ${FASTER_WHISPER_COMPUTE_TYPE:-int8}
      WHISPER__CPU_THREADS: ${FASTER_WHISPER_CPU_THREADS:-0}
      WHISPER__NUM_WORKERS: ${FASTER_WHISPER_NUM_WORKERS:-1}
      WHISPER__TTL: ${FASTER_WHISPER_TTL_SECONDS:-300}
      PRELOAD_MODELS: ${FASTER_WHISPER_PRELOAD_MODELS:-[]}
    volumes:
      - ${FASTER_WHISPER_CACHE_HOST_DIR:-faster-whisper-cache}:/root/.cache/huggingface
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import socket; s=socket.create_connection(('127.0.0.1', 8000), 3); s.close()\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  orchestrator:
    profiles: ["orchestrator", "local-linux"]
    build: .
    container_name: ai-stream-director-orchestrator
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      OBS_HOST: ${OBS_HOST:-host.docker.internal}
      OBS_PORT: ${OBS_PORT:-4455}
      OBS_PASSWORD: ${OBS_PASSWORD:-change-me}
      DRY_RUN_OBS: ${DRY_RUN_OBS:-false}
      INGEST_API_URL: ${INGEST_API_URL:-rtmp://media-server:1935/live}
      AI_PROVIDER: ${AI_PROVIDER:-ollama}
      LOOKBACK_BUFFER_DIR: ${LOOKBACK_BUFFER_DIR:-/dev/shm/clutchcam}
      FFMPEG_EXECUTABLE: ${FFMPEG_EXECUTABLE:-ffmpeg}
      AUDIO_EXTRACT_DIR: ${AUDIO_EXTRACT_DIR:-/dev/shm/clutchcam-audio}
      AUDIO_EXTRACT_SAMPLE_RATE: ${AUDIO_EXTRACT_SAMPLE_RATE:-16000}
      AUDIO_EXTRACT_CHANNELS: ${AUDIO_EXTRACT_CHANNELS:-1}
      AUDIO_EXTRACT_CHUNK_SECONDS: ${AUDIO_EXTRACT_CHUNK_SECONDS:-5}
      AUDIO_EXTRACT_CODEC: ${AUDIO_EXTRACT_CODEC:-pcm_s16le}
      AUDIO_EXTRACT_CONTAINER: ${AUDIO_EXTRACT_CONTAINER:-wav}
      AUDIO_INPUT_URL_PLAYER_1: ${AUDIO_INPUT_URL_PLAYER_1:-rtmp://media-server:1935/live/player_1}
      AUDIO_INPUT_URL_PLAYER_2: ${AUDIO_INPUT_URL_PLAYER_2:-rtmp://media-server:1935/live/player_2}
      AUDIO_INPUT_URL_PLAYER_3: ${AUDIO_INPUT_URL_PLAYER_3:-rtmp://media-server:1935/live/player_3}
      AUDIO_INPUT_URL_PLAYER_4: ${AUDIO_INPUT_URL_PLAYER_4:-rtmp://media-server:1935/live/player_4}
      TRANSCRIPTION_API_URL: ${TRANSCRIPTION_API_URL:-http://host.docker.internal:8000}
      TRANSCRIPTION_REQUEST_MODE: ${TRANSCRIPTION_REQUEST_MODE:-json}
      TRANSCRIPTION_ENDPOINT_PATH: ${TRANSCRIPTION_ENDPOINT_PATH:-}
      TRANSCRIPTION_MODEL: ${TRANSCRIPTION_MODEL:-Systran/faster-whisper-small}
      TRANSCRIPTION_LANGUAGE: ${TRANSCRIPTION_LANGUAGE:-}
      TRANSCRIPTION_RESPONSE_FORMAT: ${TRANSCRIPTION_RESPONSE_FORMAT:-json}
      TRANSCRIPTION_REQUEST_TIMEOUT_SECONDS: ${TRANSCRIPTION_REQUEST_TIMEOUT_SECONDS:-30}
      TRANSCRIPTION_REQUEST_OVERLAP_SECONDS: ${TRANSCRIPTION_REQUEST_OVERLAP_SECONDS:-0}
      LIVE_TRANSCRIPTION_ENABLED: ${LIVE_TRANSCRIPTION_ENABLED:-false}
      LIVE_TRANSCRIPTION_QUEUE_SIZE: ${LIVE_TRANSCRIPTION_QUEUE_SIZE:-16}
      TRANSCRIPT_LOG_TEXT_ENABLED: ${TRANSCRIPT_LOG_TEXT_ENABLED:-false}
      TRANSCRIPT_LOG_TEXT_MAX_CHARACTERS: ${TRANSCRIPT_LOG_TEXT_MAX_CHARACTERS:-160}
      GEMMA_API_URL: ${GEMMA_API_URL:-http://ollama:11434}
      GEMMA_MODEL: ${GEMMA_MODEL:-gemma3:4b}
      GEMMA_API_KEY: ${GEMMA_API_KEY:-}
      CONFIDENCE_THRESHOLD: ${CONFIDENCE_THRESHOLD:-0.75}
      MIN_SWITCH_INTERVAL_SECONDS: ${MIN_SWITCH_INTERVAL_SECONDS:-8}
      MAX_FOCUS_DURATION_SECONDS: ${MAX_FOCUS_DURATION_SECONDS:-20}
      TRANSCRIPT_HISTORY_SECONDS: ${TRANSCRIPT_HISTORY_SECONDS:-30}
      TRANSCRIPT_HISTORY_MESSAGES: ${TRANSCRIPT_HISTORY_MESSAGES:-20}
      TRANSCRIPT_UTTERANCE_MAX_GAP_SECONDS: ${TRANSCRIPT_UTTERANCE_MAX_GAP_SECONDS:-2.0}
      TRANSCRIPT_UTTERANCE_MAX_DURATION_SECONDS: ${TRANSCRIPT_UTTERANCE_MAX_DURATION_SECONDS:-8.0}
      TRANSCRIPT_UTTERANCE_MAX_CHARACTERS: ${TRANSCRIPT_UTTERANCE_MAX_CHARACTERS:-240}
      TRANSCRIPT_UTTERANCE_MAX_EVENTS: ${TRANSCRIPT_UTTERANCE_MAX_EVENTS:-8}
      TRANSCRIPT_PREFILTER_ENABLED: ${TRANSCRIPT_PREFILTER_ENABLED:-true}
      TRANSCRIPT_PREFILTER_MIN_TEXT_CHARACTERS: ${TRANSCRIPT_PREFILTER_MIN_TEXT_CHARACTERS:-6}
      TRANSCRIPT_PREFILTER_DUPLICATE_WINDOW_SECONDS: ${TRANSCRIPT_PREFILTER_DUPLICATE_WINDOW_SECONDS:-12}
      TRANSCRIPT_PREFILTER_CONTEXT_SECONDS: ${TRANSCRIPT_PREFILTER_CONTEXT_SECONDS:-30}
      TRANSCRIPT_PREFILTER_MIN_CONFIDENCE: ${TRANSCRIPT_PREFILTER_MIN_CONFIDENCE:-0.70}
    volumes:
      - type: bind
        source: ${LOOKBACK_BUFFER_HOST_DIR:-/dev/shm/clutchcam}
        target: /dev/shm/clutchcam
      - type: bind
        source: ${AUDIO_EXTRACT_HOST_DIR:-/dev/shm/clutchcam-audio}
        target: /dev/shm/clutchcam-audio
    command: ["python", "src/main.py"]
    healthcheck:
      test: ["CMD", "python", "src/main.py", "--healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    stdin_open: true
    tty: true

  ollama:
    profiles: ["local-ai"]
    image: ollama/ollama:latest
    container_name: ai-stream-director-ollama
    ports:
      - "${OLLAMA_BIND_ADDR:-127.0.0.1}:${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 12

  ollama-pull:
    profiles: ["local-ai"]
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
      GEMMA_MODEL: ${GEMMA_MODEL:-}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma3:4b}
    command: ["sh", "-c", "ollama pull \"$${GEMMA_MODEL:-$${OLLAMA_MODEL:-gemma3:4b}}\""]
    restart: "no"

volumes:
  ollama-data:
  faster-whisper-cache:
